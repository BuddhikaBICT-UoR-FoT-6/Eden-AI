# Spring Application Configuration
spring.application.name=eden-api
spring.config.import=optional:classpath:application-local.properties

# Database Configuration (Neon Free Cloud PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AI Search Provider Configuration (options: gemini, ollama)
ai.provider=gemini

# Local/Colab Ollama Configuration
ollama.api.url=${OLLAMA_API_URL:https://new-olives-beam.loca.lt}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}

# Google Maps API Configuration
google.maps.api.key=${GOOGLE_MAPS_API_KEY}

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:edwarddawnguard@gmail.com}
spring.mail.password=${MAIL_PASSWORD:uzumrikgydzqufey}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true