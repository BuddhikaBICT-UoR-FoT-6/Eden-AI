# Spring Application Configuration
spring.application.name=eden-api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/eden_ai
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Gemini AI Configuration
# Set this via environment variable: GEMINI_API_KEY=your_key
# Or create a local application-local.properties file (git-ignored)
gemini.api.key=${GEMINI_API_KEY:your-api-key-here}