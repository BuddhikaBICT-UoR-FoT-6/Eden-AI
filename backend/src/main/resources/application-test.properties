# H2 Database configuration for test profile (Offline/Sandboxed execution)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable showing SQL output during tests to keep logs clean
spring.jpa.show-sql=false

# Override API keys with mock keys for testing
gemini.api.key=MOCK_KEY_FOR_TESTING
google.maps.api.key=MOCK_KEY_FOR_TESTING
